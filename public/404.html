<!doctype html>
<html lang="en">
  <head>
    <title>Page not found (404) · Language Bridge</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600&family=JetBrains+Mono:wght@600&display=swap">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #0f172a;
        font-family: "Figtree", ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-align: center;
        padding: 2rem;
      }
      .code {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 64px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .rule { width: 40px; height: 2px; background: #1d4ed8; margin: 22px auto; }
      h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
      p { margin: 9px auto 24px; font-size: 14px; color: #64748b; max-width: 360px; line-height: 1.5; }
      a.btn {
        display: inline-flex; align-items: center; gap: 8px;
        height: 40px; padding: 0 18px; border-radius: 6px;
        background: #0f172a; color: #fff; font-size: 14px; font-weight: 500;
        text-decoration: none;
      }
      a.btn:hover { background: #1e293b; }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <div class="rule"></div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist, or you don't have access to it.</p>
      <a class="btn" href="/">&larr;&nbsp;&nbsp;Back to projects</a>
    </main>
  </body>
</html>
